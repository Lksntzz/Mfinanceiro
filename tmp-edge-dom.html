<!DOCTYPE html>
<html lang="pt-BR"><head>
    <script type="module" src="/@vite/client"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Verify</title>
  </head>
  <body>
    <pre id="result">{
  "path": "/dashboard.html",
  "atualizarDashboardType": "undefined",
  "hasCardSaldoAtual": false,
  "hasExpenseEvolutionBars": false,
  "hasInsightsList": false,
  "insightsItems": 0,
  "errorBannerText": ""
}</pre>
    <iframe id="dashboard-frame" src="/dashboard.html" style="width: 1200px; height: 900px; border: 0"></iframe>

    <script>
      const TEST_EMAIL = "lucas89775@gmail.com";
      const TEST_PASSWORD = "W1w2w3w4";
      const resultNode = document.getElementById("result");
      const frame = document.getElementById("dashboard-frame");

      function setResult(payload) {
        resultNode.textContent = JSON.stringify(payload, null, 2);
      }

      function wait(ms) {
        return new Promise((resolve) => window.setTimeout(resolve, ms));
      }

      async function waitFor(check, timeoutMs = 10000) {
        const startedAt = Date.now();

        while (Date.now() - startedAt < timeoutMs) {
          try {
            const value = check();

            if (value) {
              return value;
            }
          } catch (error) {
            // Ignore transient frame access errors while the document is loading.
          }

          await wait(200);
        }

        throw new Error("Dashboard verification timed out.");
      }

      async function run() {
        try {
          await waitFor(() => frame.contentDocument?.readyState === "complete");

          let frameWindow = frame.contentWindow;
          let frameDocument = frame.contentDocument;

          if (frameWindow.location.pathname === "/login.html") {
            await waitFor(
              () =>
                frameDocument.getElementById("email") &&
                frameDocument.getElementById("senha") &&
                frameDocument.getElementById("login-form")
            );

            frameDocument.getElementById("email").value = TEST_EMAIL;
            frameDocument.getElementById("senha").value = TEST_PASSWORD;
            frameDocument
              .getElementById("login-form")
              .dispatchEvent(new Event("submit", { bubbles: true, cancelable: true }));

            await waitFor(
              () => frame.contentWindow.location.pathname === "/dashboard.html",
              15000
            );
            await waitFor(() => frame.contentDocument?.readyState === "complete", 15000);
          }

          await wait(2500);

          frameWindow = frame.contentWindow;
          frameDocument = frame.contentDocument;

          setResult({
            path: frameWindow.location.pathname,
            atualizarDashboardType: typeof frameWindow.atualizarDashboard,
            hasCardSaldoAtual: Boolean(frameDocument.getElementById("card-saldo-atual")),
            hasExpenseEvolutionBars: Boolean(frameDocument.getElementById("expense-evolution-bars")),
            hasInsightsList: Boolean(frameDocument.getElementById("insights-list")),
            insightsItems: frameDocument.querySelectorAll("#insights-list li").length,
            errorBannerText:
              frameDocument.getElementById("dashboard-feedback")?.textContent?.trim() || "",
          });
        } catch (error) {
          setResult({
            error: error.message,
          });
        }
      }

      run();
    </script>
  

</body></html>
